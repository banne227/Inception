[www]
user  = www-data
group = www-data

; Listen on TCP 9000 so Nginx can reach PHP-FPM across containers.
; Do not use the unix socket path in this multi-container setup.
listen = 9000

listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children     = 5
pm.start_servers    = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Logs
php_admin_value[error_log] = /var/log/fpm-php.www.log
php_admin_flag[log_errors] = on
